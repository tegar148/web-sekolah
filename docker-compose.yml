version: '3.8'

services:
  # Container Aplikasi Laravel
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web_sekolah_app
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=web_sekolah
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      - mysql
    networks:
      - app-network

  # Container Database MySQL
  mysql:
    image: mysql:8.0
    container_name: web_sekolah_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: web_sekolah
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  # Container phpMyAdmin untuk manajemen database
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: web_sekolah_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - mysql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
